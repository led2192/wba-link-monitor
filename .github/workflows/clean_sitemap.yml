name: Clean junk sitemap rows (one-off)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only count, don't delete"
        type: boolean
        default: true

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python clean_sitemap.py
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_TABLE: monitored_links
          DRY_RUN: ${{ github.event.inputs.dry_run }}
