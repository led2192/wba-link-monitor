name: Classify detections (daily)

on:
  schedule:
    - cron: "0 7 * * *"        # daily 07:00 UTC, after the monitor
  workflow_dispatch:
    inputs:
      force:
        description: "Re-classify ALL rows (use once after a logic change)"
        type: boolean
        default: false

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python classify_detections.py
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_DETECTIONS_TABLE: detections
          CLASSIFY_FORCE: ${{ github.event.inputs.force }}
