name: Classify detections (daily)

on:
  schedule:
    - cron: "0 7 * * *"        # 07:00 UTC, an hour after the daily monitor
  workflow_dispatch: {}

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python classify_detections.py
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_DETECTIONS_TABLE: detections
