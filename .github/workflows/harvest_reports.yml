name: Harvest report PDFs

on:
  workflow_dispatch:
    inputs:
      types:
        description: "Page types to include (comma-separated)."
        type: string
        default: "reports_hub,sustainability_page,sustainability_report,investor_relations,policies"
      reports_only:
        description: "Keep only PDFs whose file name looks like a report."
        type: boolean
        default: false
      commit:
        description: "WRITE into report_library. Leave OFF for a dry-run."
        type: boolean
        default: false
  workflow_run:
    workflows: ["Monitor links (daily)"]   # runs right after the daily monitor finishes
    types: [completed]

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    # auto-run only if the monitor succeeded; manual runs always allowed
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run harvester
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPES="${{ inputs.types }}"; RO="${{ inputs.reports_only }}"; DO_COMMIT="${{ inputs.commit }}"
          else
            # nightly auto-run after the monitor: same scope you harvested, delta write, committed
            TYPES="reports_hub,sustainability_page,sustainability_report,investor_relations,policies"
            RO="false"; DO_COMMIT="true"
          fi
          ARGS="--types $TYPES"
          [ "$RO" = "true" ] && ARGS="$ARGS --reports-only"
          [ "$DO_COMMIT" = "true" ] && ARGS="$ARGS --commit"
          echo ">>> python harvest_reports.py $ARGS"
          python harvest_reports.py $ARGS
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_TABLE: monitored_links
          AIRTABLE_LIBRARY_TABLE: report_library
