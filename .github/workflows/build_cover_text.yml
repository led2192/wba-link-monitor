name: Build cover text (one-off)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        type: choice
        default: "dry-run"
        options:
          - dry-run
          - diagnose
          - commit
          - reclaim
      pages:
        description: "First N pages to read"
        default: "8"
      limit:
        description: "Cap total rows (0 = all)"
        default: "0"

jobs:
  cover:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build cover text
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_LIBRARY_TABLE: report_library
          AIRTABLE_FILE_FIELD: file
          AIRTABLE_COVER_FIELD: cover_text
          AIRTABLE_COVER_STATUS: cover_status
          AIRTABLE_PAGECOUNT_FIELD: page_count
          AIRTABLE_DOCLANG_FIELD: doc_language
        run: |
          ARGS="--pages ${{ inputs.pages }} --limit ${{ inputs.limit }}"
          [ "${{ inputs.mode }}" = "commit" ]  && ARGS="$ARGS --commit"
          [ "${{ inputs.mode }}" = "reclaim" ]  && ARGS="$ARGS --reclaim"
          [ "${{ inputs.mode }}" = "diagnose" ] && ARGS="$ARGS --diagnose 30"
          echo ">>> python build_cover_text.py $ARGS"
          python build_cover_text.py $ARGS
