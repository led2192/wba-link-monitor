name: Sitemap discovery (monthly)

on:
  schedule:
    - cron: "0 4 2 * *"        # 2nd of each month, 04:00 UTC
  workflow_dispatch: {}

jobs:
  sitemap:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python sitemap_discovery.py
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_TABLE: monitored_links
