# Rotating-queue browser monitor, DAILY. Each run takes up to MAX_PAGES of the stalest
# pages, productive (needs_browser) first with dead/error rescues capped at RESCUE_SHARE, always
# finishing cleanly inside RUN_BUDGET_MIN wall-clock minutes; the rotation continues next run.
# Sized 2026-07-17 for a queue of ~15.7k productive + ~6.7k rescue pages: 4000/day at 5 workers
# cycles the productive pool in ~5 days. It runs at 00:03 UTC ON PURPOSE: it lands before
# the 02:23 daily monitor, so the harvest that chains after the monitor ingests the browser's
# findings the SAME night instead of a day later.
#
# Manual dispatch is the debug lever: set wba_id (e.g. PT_00019) to render ALL monitored
# URLs of that company in minutes — targeted runs ignore needs_browser/status and do NOT
# claim pages for the browser, so debug sweeps never grow the weekly queue.
name: Browser monitor

on:
  schedule:
    - cron: "3 0 * * *"        # daily 00:03 UTC — before the 02:23 monitor, so harvest picks
                               # up tonight's browser findings in the same cascade
  workflow_dispatch:
    inputs:
      wba_id:
        description: "Comma-separated wba_ids: render ALL monitored URLs of these companies"
        default: ""
      url_contains:
        description: "Substring filter on url (case-insensitive), e.g. grupoacs"
        default: ""
      max_pages:
        description: "Cap pages this run (queue mode only; 0 = no cap)"
        default: "4000"
      workers:
        description: "Parallel browser workers"
        default: "5"

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt playwright
      - run: playwright install --with-deps chromium
      - run: python playwright_monitor.py
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_TABLE: monitored_links
          PW_WBA: ${{ inputs.wba_id }}
          PW_CONTAINS: ${{ inputs.url_contains }}
          MAX_PAGES: ${{ inputs.max_pages || '4000' }}
          PW_WORKERS: ${{ inputs.workers || '5' }}
          RUN_BUDGET_MIN: '180'
          RESCUE_SHARE: '0.25'
