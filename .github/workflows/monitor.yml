name: Monitor links (daily)

on:
  schedule:
    - cron: "23 2 * * *"       # daily 02:23 UTC (04:23 CEST): the whole cascade (harvest ->
                               # classify -> attach -> cover text) lands before the working day.
                               # Off-hour minute on purpose: GitHub delays :00 schedules under load.
  workflow_dispatch:
    inputs:
      force_all:
        description: "Check ALL monitored links regardless of weekday (use once to baseline)"
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python airtable_monitor.py
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_TABLE: monitored_links
          MONITOR_FORCE_ALL: ${{ inputs.force_all }}
          MONITOR_FLAG_SPA: "true"
