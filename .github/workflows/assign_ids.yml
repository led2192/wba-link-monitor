name: Assign join ids (one-off / re-runnable)

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Recompute ids for ALL rows (otherwise only fills empty ones)"
        type: boolean
        default: false
  # Daily at 02:03 UTC, 20 min before the monitor (02:23), so analyst-added rows get a
  # link_id before the monitor reads them and the harvester tags source_link_id.
  schedule:
    - cron: "3 2 * * *"

jobs:
  assign-ids:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Assign ids
        run: python assign_ids.py
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_TABLE: monitored_links
          IDS_FORCE: ${{ inputs.force && 'true' || '' }}
